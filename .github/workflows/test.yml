name: test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 0'  # Sundays 07:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

# Cache key strategy: `hashFiles('Makefile')` evaluates only inside a
# job/step (not workflow-level env), so it's inlined in every cache step.
# Hashing the Makefile means any change to QUAKE_URL or QUAKE_SHA256
# rolls the key; the tarball is OS-independent so all jobs share it.
jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: '1.7.12'
      ACTIONLINT_SHA256: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install actionlint (pinned release + sha256-verified)
        run: |
          set -euo pipefail
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint
      - run: ./actionlint -color .github/workflows/test.yml
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          # Pakka is not a Python project; the default cache glob hunts
          # for requirements.txt / pyproject.toml and warns that the
          # cache will never invalidate. We only use uv to run zizmor
          # once — caching buys nothing.
          enable-cache: false
      - run: uvx zizmor==1.25.2 .github/workflows/test.yml
      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy
      - run: make lint

  macos-intel-x86_64:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: brew install bats-core
      - run: make test

  macos-apple-silicon-arm64:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: brew install bats-core
      - run: make test

  linux-glibc-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bats curl openssl zip python3
      - run: make test

  # Exercises the opt-in zlib DEFLATE backend (PAKKA_DEFLATE_BACKEND=zlib /
  # -DPAKKA_USE_ZLIB=ON) end-to-end. The vendored sdefl + sinfl codecs
  # are the default and run across the rest of the matrix; this job
  # covers the wrapper at src/deflate/deflate_zlib.c so the shim doesn't
  # bit-rot between releases of libz. Game-engine integrators (ioquake3,
  # dhewm3, ...) that already link zlib are the primary consumers.
  linux-glibc-x86_64-zlib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bats curl openssl zip python3 zlib1g-dev
      - run: make PAKKA_DEFLATE_BACKEND=zlib test

  # Cross-arm lint. Runs clang-tidy against src/cli.c, src/platform.c,
  # and src/pakfile.c under --target=x86_64-w64-mingw32 with Linux's
  # mingw-w64 headers standing in for the MSVC SDK. Catches
  # regressions in the _WIN32 arm (platform shims, the wingetopt /
  # dirent vendored paths, the MoveFileExA / GetLastError plumbing
  # in the rebuild commit path) without waiting for the windows-msvc
  # job. Runs on every push so PRs that touch a Win32-aware source
  # get fast feedback.
  lint-win32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: |
          sudo apt-get update
          # mingw-w64-x86-64-dev is the headers + import libs only;
          # the full `mingw-w64` meta-package pulls the gcc cross-
          # compiler matrix (i686 + x86_64, posix + win32 variants,
          # ~200 MB) which the apt step couldn't even finish within
          # the job timeout. clang-tidy doesn't need GCC; LLVM does
          # the analysis itself with --target=x86_64-w64-mingw32.
          sudo apt-get install -y clang-tidy mingw-w64-x86-64-dev
      # REQUIRE_WIN32_HEADERS=1 turns the local soft-skip into a
      # hard error: in CI the install above either landed the
      # headers or it didn't, and a silently-skipped lint is worse
      # than a noisy failure.
      - run: make REQUIRE_WIN32_HEADERS=1 lint-win32

  # libFuzzer smoke. Builds each harness under -fsanitize=fuzzer,
  # address,undefined and runs it for 60s against the seed corpus.
  # Catches parser-side memory corruption (open path), opcode
  # bound-check regressions (DK codec), and structural-invariant
  # breaks across the open→commit→reopen cycle (roundtrip). Runs
  # only on push to master and schedule — too slow for every PR but
  # enough cadence to catch regressions before release. The `clang`
  # apt package brings libclang_rt.fuzzer along with the compiler;
  # gcc by itself does not ship libFuzzer.
  fuzz:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang
      - run: make FUZZ_CC=clang fuzz
      - name: fuzz pakka_open (60s)
        run: ./build/fuzz/pakka_fuzz_open dev/fuzz/corpus_open -max_total_time=60 -print_final_stats=1
      - name: fuzz pakka_dk_inflate (60s)
        run: ./build/fuzz/pakka_fuzz_dk_inflate dev/fuzz/corpus_dk -max_total_time=60 -print_final_stats=1
      - name: fuzz open+commit roundtrip (60s)
        run: ./build/fuzz/pakka_fuzz_roundtrip dev/fuzz/corpus_roundtrip -max_total_time=60 -print_final_stats=1

  # Coverage report. Runs the full bats suite under
  # -fprofile-arcs -ftest-coverage and uploads the lcov HTML tree as
  # an artifact. Useful for spotting under-tested code paths
  # (deep-verify branches, fault-injected error returns); not a gate
  # — the bats suite is the gate. Runs only on push to master and
  # schedule to keep PR builds quick.
  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bats curl openssl zip python3 lcov
      - run: make coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: build/coverage/html
          retention-days: 14

  # ASan + UBSan canary. Linked against libpakka.a + the CLI under
  # -fsanitize=address,undefined with -fno-sanitize-recover=undefined so
  # any UB during the bats suite is a hard failure. -O1 keeps inlining
  # readable in error traces; the assumption is that this job catches
  # leaks, use-after-free, and signed overflow, NOT logical archive
  # corruption — fault-injection bats (separate harness) covers that.
  asan-ubsan-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bats curl openssl zip python3
      - run: |
          make CFLAGS="-g -O1 -Wall --std=c99 --pedantic \
              -fno-omit-frame-pointer \
              -fsanitize=address,undefined \
              -fno-sanitize-recover=undefined" \
              test
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

  linux-glibc-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bats curl openssl zip python3
      - run: make test

  # Big-endian correctness canary. s390x is the cheapest BE target: a
  # binfmt-registered QEMU emulation runs Debian's official s390x
  # image directly, no custom image to maintain. Exists to catch any
  # regression in read_u32_le / write_u32_le or any new code that
  # touches the on-disk format with a raw fread/fwrite.
  linux-glibc-s390x-be:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: s390x
      - name: Build + test under s390x (big-endian)
        run: |
          docker run --rm --platform linux/s390x \
            -v "$PWD:/src:ro" \
            debian:bookworm-slim \
            bash -c '
              set -e
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends \
                build-essential bats curl openssl ca-certificates zip unzip python3 >/dev/null
              cp -a /src/. /work
              cd /work
              rm -f pakka
              rm -rf build/obj
              echo "host: $(uname -m)"
              make
              make test
            '

  linux-musl-x86_64:
    runs-on: ubuntu-latest
    container: alpine:3.23@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    steps:
      # tar + zstd are needed by actions/cache; Alpine's busybox tar can't
      # produce the archive format the cache action expects on save.
      - run: apk add --no-cache build-base make curl openssl bats bash git tar zstd zip python3
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: make test

  # 32-bit ABI build on a 64-bit kernel/libc via -m32. Not a true i386 OS,
  # but exercises the 32-bit code path (size_t width, pointer width, etc.).
  linux-glibc-amd64-m32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib build-essential bats curl openssl zip python3
      - run: make test CFLAGS="-g -Wall --std=c99 --pedantic -m32"

  # Host cache survives into the VM: vmactions/*-vm rsyncs the workspace
  # before running, so build/test/quakesw.tar.gz comes with it.
  freebsd-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          sync: rsync
          prepare: pkg install -y gmake curl bats-core zip unzip python3
          run: gmake test

  # 32-bit ABI build on a 64-bit FreeBSD kernel via -m32 + lib32 (ships in base).
  # vmactions doesn't run a true i386 BSD guest.
  freebsd-amd64-m32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          sync: rsync
          prepare: pkg install -y gmake curl bats-core zip unzip python3
          run: gmake test CFLAGS="-g -Wall --std=c99 --pedantic -m32"

  openbsd-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      - uses: vmactions/openbsd-vm@v1
        with:
          release: '7.8'
          sync: rsync
          # OpenBSD pkg_add disambiguation: `unzip--` picks the default
          # (non-iconv) flavor; `python%3` picks the latest python 3.x.
          # Plain `unzip` / `python3` fail with "Ambiguous" / "Can't find".
          prepare: pkg_add -I gmake curl bats zip 'unzip--' 'python%3'
          run: gmake test

  # Windows / MSVC build. Uses CMake to drive cl.exe (the Unix Makefile
  # doesn't apply here) and MSYS2 to provide bash + bats for running
  # the existing test suite against the resulting pakka.exe.
  windows-msvc-x86_64:
    # windows-latest is being redirected to this label by mid-June 2026
    # per the runner banner; pinning explicitly avoids the noise.
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/quakesw.tar.gz
          key: quakesw-${{ hashFiles('Makefile') }}
      # Fork of ilammy/msvc-dev-cmd that's actively maintained and
      # runs on Node 24 (ilammy's v1.13.0 is still on Node 20).
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - uses: msys2/setup-msys2@v2
        with:
          # setup-msys2 caches its install dir by default (keyed on the
          # install list). `update: false` keeps `pacman -Syu` from
          # firing on every run — the windows-latest MSYS2 base already
          # ships current versions of everything we need.
          update: false
          install: >-
            bash
            coreutils
            curl
            diffutils
            git
            openssl
            tar
            make
            zip
            unzip
            python3
      # MSYS2 has no bats package; install from upstream. /usr/local/bin
      # is on the default MSYS2 PATH so no extra wiring needed.
      - name: Install bats-core
        run: |
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          /tmp/bats-core/install.sh /usr/local
      # CMake/Ninja are preinstalled on the windows-latest image but live
      # outside the MSYS2 environment; expose them via a cmd shell that
      # has both MSVC and the runner PATH set up.
      - name: Configure (CMake / Ninja / MSVC)
        shell: pwsh
        # PAKKA_TEST_BUILD=ON mirrors the Makefile's `make test` flag so
        # libpakka compiles in the same fault-injection hooks the bats
        # suite relies on. NOP at runtime when PAKKA_INJECT_FAULT_AT
        # isn't set; safe to enable across all CI jobs.
        run: cmake -B build/cmake -G Ninja -DPAKKA_TEST_BUILD=ON .
      - name: Build
        shell: pwsh
        run: cmake --build build/cmake
      - name: Fetch + verify Quake fixture
        run: make fixture
      - name: Run bats tests against pakka.exe
        # Resolve PAKKA to an MSYS2-style absolute path: relative paths
        # can break inside bats's setup_file (bats may chdir into a temp
        # dir before invoking it), and $GITHUB_WORKSPACE is Windows-shape
        # which trips MSYS2 bash path resolution. $PWD inside this step
        # is already the MSYS2 form of the workspace.
        run: |
          ls -la build/cmake/ || true
          test -x build/cmake/pakka.exe
          test -x build/cmake/c_api_test.exe
          test -x build/cmake/dk_codec_test.exe
          export PAKKA="$PWD/build/cmake/pakka.exe"
          export C_API_TEST="$PWD/build/cmake/c_api_test.exe"
          export DK_CODEC_TEST="$PWD/build/cmake/dk_codec_test.exe"
          export PAK0="$PWD/build/test/pak0.pak"
          bats test/
      # CTest runs the native C tests (proc_self_test, large_file_test)
      # alongside bats. Both must stay green during the migration window
      # (Phase E gate) until the bats files are deleted. pwsh shell
      # because ctest is a native Windows binary that expects Windows-
      # shape paths.
      - name: Run ctest (native C test suite)
        shell: pwsh
        run: ctest --test-dir build/cmake --output-on-failure

  # Legacy floor: Sarge-derived userland (glibc 2.3.2, gcc 3.3) plus
  # GNU make 3.79.1 built from source. Catches order-only-prereq
  # regressions (Sarge ships make 3.80; the custom build overrides
  # it) and post-2006 POSIX dependencies before they reach the QEMU
  # RH9 probe. linux/386 because the base image is 32-bit i386 only;
  # GHA's ubuntu-latest kernel has CONFIG_IA32_EMULATION=y so i386
  # binaries run without QEMU.
  legacy-glibc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build legacy image (Sarge + make 3.79.1)
        run: |
          docker build --platform linux/386 \
            -t pakka-legacy-glibc \
            -f dev/legacy/ci/Dockerfile \
            dev/legacy/ci/
      - name: Build pakka under glibc 2.3.2 / gcc 3.3 / GNU make 3.79.1
        run: |
          docker run --rm --platform linux/386 \
            -v "$PWD:/src:ro" \
            pakka-legacy-glibc

  # Same floor, but with the literal RH9 toolchain (glibc 2.3.2-11.9,
  # gcc 3.2.2-5, GNU make 3.79.1-17) assembled from SHA-pinned vault
  # RPMs. If legacy.redhat.com goes dark this job fails fast; the
  # authoritative fallback is the QEMU probe in dev/legacy/rh9/.
  legacy-rh9:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build RH9 rootfs image
        run: |
          docker build --platform linux/386 \
            -t pakka-legacy-rh9 \
            -f dev/legacy/ci/Dockerfile.rh9 \
            dev/legacy/ci/
      - name: Build pakka under literal RH9 toolchain
        run: |
          docker run --rm --platform linux/386 \
            -v "$PWD:/src:ro" \
            pakka-legacy-rh9

  # Build pakka on a literal NetBSD 3.0/sparc guest under QEMU. The
  # disk image is a one-time sysinst install + GNU make 3.81 bootstrap,
  # snapshotted and uploaded as a GitHub release artifact. This is the
  # only CI job that actually exercises the BSD-version arm of
  # PAKKA_LEGACY_EXTRACT (modern BSDs in the matrix all have openat).
  # Sparc emulation runs ~10x slower than native, so this job is the
  # slowest in the matrix (~10 min).
  legacy-netbsd-sparc:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install qemu-system-sparc + sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-sparc sshpass
      - name: Download + verify NetBSD 3.0/sparc disk snapshot
        env:
          DISK_URL: https://github.com/ajbonner/pakka/releases/download/legacy-netbsd-sparc-disk-v1/pakka-legacy-netbsd-sparc-disk-v1.qcow2
          DISK_SHA256: 890aa5a003efa3ce7b8ed61487bf29f46c60d720bbb9062677e62b22934295c4
        run: |
          # Stage everything in runner.temp so the disk doesn't end up
          # bundled into pakka-src.tar.gz (run-build.sh tars `.` from
          # the checkout).
          curl -fsSL -o "$RUNNER_TEMP/netbsd-sparc.qcow2" "$DISK_URL"
          echo "$DISK_SHA256  $RUNNER_TEMP/netbsd-sparc.qcow2" \
            | sha256sum -c -
      - name: Boot guest + drive build over SSH
        env:
          PAKKA_NBSD_WORKDIR: ${{ runner.temp }}
          PAKKA_NBSD_SSH_PORT: '10022'
          PAKKA_NBSD_ROOT_PASSWORD: pakka
        run: |
          set -euo pipefail

          QEMU_LOG="$RUNNER_TEMP/qemu.log"

          # Cleanup trap: dump the qemu console if anything failed,
          # attempt a clean halt if SSH is still reachable, finally
          # kill QEMU. Keeps a hung build from burning the full
          # timeout-minutes budget silently.
          cleanup() {
              rc=$?
              if [ "$rc" -ne 0 ]; then
                  echo '=== qemu.log tail (job failed) ==='
                  tail -50 "$QEMU_LOG" || true
                  echo '=== console.log tail (kernel/userland) ==='
                  tail -80 "$RUNNER_TEMP/console.log" 2>/dev/null || true
              fi
              if [ -n "${QPID:-}" ] && kill -0 "$QPID" 2>/dev/null; then
                  # Wrap halt in `timeout` so a hung remote shell
                  # can't stall the cleanup; ConnectTimeout only
                  # bounds SSH connection setup, not the remote
                  # command.
                  timeout 15 sshpass -p "$PAKKA_NBSD_ROOT_PASSWORD" ssh \
                    -p "$PAKKA_NBSD_SSH_PORT" \
                    -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                    -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa \
                    -o KexAlgorithms=+diffie-hellman-group14-sha1 \
                    -o Ciphers=+aes128-cbc -o MACs=+hmac-sha1 \
                    -o ConnectTimeout=5 \
                    root@127.0.0.1 '/sbin/halt -p' 2>/dev/null || true
                  for _ in $(seq 1 6); do
                      kill -0 "$QPID" 2>/dev/null || break
                      sleep 5
                  done
                  kill -9 "$QPID" 2>/dev/null || true
                  wait "$QPID" 2>/dev/null || true
              fi
              exit "$rc"
          }
          trap cleanup EXIT INT TERM

          # SS-5 has a built-in lance NIC; -nic attaches the user-mode
          # backend to it. Older `-net nic,model=lance / -net user,...`
          # split form is deprecated and prints `type is NULL` on
          # ubuntu-latest's qemu 8.x. Capture the serial console to a
          # dedicated file so the cleanup trap can tail it on failure;
          # -display none alone leaves serial unattached.
          qemu-system-sparc \
            -M SS-5 -m 256 \
            -drive file="$RUNNER_TEMP/netbsd-sparc.qcow2",format=qcow2,if=scsi,bus=0,unit=0,media=disk \
            -nic user,model=lance,hostfwd=tcp::10022-:22 \
            -serial "file:$RUNNER_TEMP/console.log" \
            -display none -no-reboot \
            >"$QEMU_LOG" 2>&1 &
          QPID=$!
          echo "qemu pid=$QPID"

          # Poll for SSH readiness — first boot under emulation takes
          # 1-3 min on a sparc TCG translation. QEMU's user-mode net
          # opens the host listener INSTANTLY (before the guest is
          # up), so `nc -z` is unreliable here; do a real SSH
          # handshake probe instead.
          ssh_probe() {
              timeout 8 sshpass -p "$PAKKA_NBSD_ROOT_PASSWORD" ssh \
                -p "$PAKKA_NBSD_SSH_PORT" \
                -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa \
                -o KexAlgorithms=+diffie-hellman-group14-sha1 \
                -o Ciphers=+aes128-cbc -o MACs=+hmac-sha1 \
                -o ConnectTimeout=5 \
                root@127.0.0.1 'true' >/dev/null 2>&1
          }
          ssh_ready=0
          for _ in $(seq 1 120); do
              if ! kill -0 "$QPID" 2>/dev/null; then
                  echo "qemu died before SSH came up"
                  exit 1
              fi
              if ssh_probe; then
                  ssh_ready=1
                  break
              fi
              sleep 5
          done
          if [ "$ssh_ready" -ne 1 ]; then
              echo "SSH did not come up within 10 minutes"
              exit 1
          fi

          export PAKKA_NBSD_WORKDIR PAKKA_NBSD_SSH_PORT PAKKA_NBSD_ROOT_PASSWORD
          dev/legacy/netbsd-sparc/scripts/run-build.sh

  # Realpak-test suites. Exercise pakka against real game-engine
  # archives downloaded from archive.org (id's Q3 demo PK3, Valve's
  # Half-Life Uplink + Day One PAKs) — bigger fixtures + more entries
  # than the synthetic Quake 1 shareware pak that the default `test`
  # target uses. The bats suites themselves run in seconds; the 93
  # MiB Q3 demo + 48 MiB Uplink + 90 MiB Day One downloads are the
  # only meaningful wall-clock cost, and they're cached on a
  # hashFiles('Makefile') key (URLs + SHA256s live there) so the zip
  # is fetched once and reused across reruns and across the
  # Linux/Windows pair for each suite. Q3 and GoldSrc are split into
  # separate jobs so failures attribute cleanly.
  realpak-test-q3-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/q3demo.zip
          key: q3demo-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bats curl openssl unzip
      - run: make realpak-test-q3

  realpak-test-goldsrc-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: |
            build/test/hl-uplink.zip
            build/test/hl-dayone.zip
          key: goldsrc-${{ hashFiles('Makefile') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bats curl openssl unzip
      - run: make realpak-test-goldsrc

  # Native-Windows realpak: no MSYS2 install. Fixture fetch + SHA verify
  # + extract via dev/win/fixtures.ps1 (PowerShell 7+ ships on the runner
  # image); test execution via CTest (pk3_q3demo_test, registered in
  # test/CMakeLists.txt). The Linux/macOS realpak-test-q3 Makefile
  # target still runs bats alongside the C tests, so per-job dual
  # coverage continues during the migration window.
  realpak-test-q3-windows:
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: build/test/q3demo.zip
          key: q3demo-${{ hashFiles('dev/win/fixtures.ps1') }}
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: Configure (CMake / Ninja / MSVC)
        # PAKKA_TEST_BUILD=ON mirrors the Makefile's `make test` flag so
        # libpakka compiles in the same fault-injection hooks the test
        # suite relies on. NOP at runtime when PAKKA_INJECT_FAULT_AT
        # isn't set; safe to enable across all CI jobs.
        run: cmake -B build/cmake -G Ninja -DPAKKA_TEST_BUILD=ON .
      - name: Build
        run: cmake --build build/cmake
      - name: Fetch + verify Q3 demo fixture
        run: pwsh -NoLogo -File dev/win/fixtures.ps1 -Suite q3
      - name: Run Q3 realpak C test against pakka.exe
        # CTest sets PAKKA via the test/CMakeLists.txt ENVIRONMENT
        # property; we pass Q3DEMO_PAK0_PK3 here so the gating in
        # pk3_q3demo_test.c flips from SKIP to RUN.
        env:
          Q3DEMO_PAK0_PK3: ${{ github.workspace }}\build\test\q3demo\pak0.pk3
        run: ctest --test-dir build/cmake -R pk3_q3demo_test --output-on-failure

  # Native-Windows GoldSrc realpak: same model as realpak-test-q3-windows
  # — no MSYS2; PowerShell-only fixture prep + CTest run.
  realpak-test-goldsrc-windows:
    runs-on: windows-2025-vs2026
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/cache@v5
        with:
          path: |
            build/test/hl-uplink.zip
            build/test/hl-dayone.zip
          key: goldsrc-${{ hashFiles('dev/win/fixtures.ps1') }}
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: Configure (CMake / Ninja / MSVC)
        # PAKKA_TEST_BUILD=ON mirrors the Makefile's `make test` flag so
        # libpakka compiles in the same fault-injection hooks the bats
        # suite relies on. NOP at runtime when PAKKA_INJECT_FAULT_AT
        # isn't set; safe to enable across all CI jobs.
        run: cmake -B build/cmake -G Ninja -DPAKKA_TEST_BUILD=ON .
      - name: Build
        run: cmake --build build/cmake
      - name: Fetch + verify Uplink + Day One fixtures
        run: |
          pwsh -NoLogo -File dev/win/fixtures.ps1 -Suite goldsrc-uplink
          pwsh -NoLogo -File dev/win/fixtures.ps1 -Suite goldsrc-dayone
      - name: Run GoldSrc realpak C test against pakka.exe
        env:
          GOLDSRC_UPLINK_PAK0: ${{ github.workspace }}\build\test\hl-uplink\valve\pak0.pak
          GOLDSRC_DAYONE_PAK0: ${{ github.workspace }}\build\test\hl-dayone\valve\pak0.pak
        run: ctest --test-dir build/cmake -R pak_goldsrc_test --output-on-failure
