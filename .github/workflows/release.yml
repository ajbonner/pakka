name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  # First job: gatekeeper. Validates the tag shape, confirms the
  # Makefile and CMakeLists.txt versions match, and exports both `tag`
  # (v1.5.0 — used in release title / git refs) and `version` (1.5.0 —
  # used in artifact filenames; matches CPack's CPACK_PACKAGE_FILE_NAME)
  # to downstream jobs.
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          # On workflow_dispatch, check out the requested tag instead
          # of the dispatch branch — otherwise the Makefile/CMakeLists
          # sanity check below runs against the wrong tree.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Determine tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_TAG" ]; then
              tag="$INPUT_TAG"
          else
              tag="${REF##*/}"
          fi
          # Glob is too loose — `v[0-9]*.[0-9]*.[0-9]*` would accept
          # `v1.2.3-rc1` and similar. Use a strict regex.
          if ! printf '%s\n' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "tag '$tag' is not strictly vX.Y.Z" >&2
              exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Verify Makefile and CMakeLists.txt versions match the tag
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          make_version=$(awk -F= '
              /^MAJOR=/{ maj=$2 }
              /^MINOR=/{ min=$2 }
              /^PATCH=/{ p=$2 }
              END { printf "%s.%s.%s", maj, min, p }
          ' Makefile)
          cmake_version=$(awk '
              /project\(pakka VERSION/ {
                  for (i=1; i<=NF; i++) if ($i == "VERSION") { print $(i+1); exit }
              }
          ' CMakeLists.txt)
          if [ "$make_version" != "$VERSION" ]; then
              echo "Makefile version is $make_version, tag is $VERSION" >&2
              exit 1
          fi
          if [ "$cmake_version" != "$VERSION" ]; then
              echo "CMakeLists.txt version is $cmake_version, tag is $VERSION" >&2
              exit 1
          fi
          echo "Makefile and CMakeLists.txt both at $VERSION — matches $TAG"

  # Source tarball — `make dist` invokes `git archive HEAD` to produce
  # pakka-X.Y.Z.tar.gz + a SHA-256 sidecar. The fetch-depth: 0 above
  # leaves the tag in the work tree at HEAD, which is what git archive
  # snapshots. The tarball itself is OS-neutral (POSIX source); the
  # ubuntu-latest runner is just convenience for git + openssl.
  source-tarball:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag }}
      - name: Build source tarball
        run: make dist
      - uses: actions/upload-artifact@v7
        with:
          name: source-tarball
          path: |
            pakka-*.tar.gz
            pakka-*.tar.gz.sha256
          if-no-files-found: error

  # Windows ZIPs — CMake + Ninja build, then `cpack -G ZIP`. Each matrix
  # leg writes one zip under build/cmake/: the full pakka-X.Y.Z-windows-
  # {x64,x86}.zip (CLI + lib) and the library-only libpakka-X.Y.Z-windows-
  # {x64,x86}.zip (PAKKA_BUILD_CLI=OFF — static lib + header + libpakka
  # manpage + docs, no CLI). Compute SHA-256 sidecars alongside them.
  # Note: PowerShell uses backtick (`) for line continuation, not `\`;
  # and the zips are in build/cmake/, not the workspace root.
  windows-zip:
    needs: verify
    # Pin to the same label test.yml uses — `windows-latest` resolves
    # to a runner whose first cc.exe on PATH is MinGW, which links
    # pakka's wmain-style entry point against WinMain and fails.
    # Pakka's CMake config is MSVC-targeted (see CMakeLists.txt MSVC
    # branches), so the release ZIP must come off MSVC too.
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_arch: x64
            msvc_arch: x64
            cli: "ON"
            pkg: pakka
          - package_arch: x86
            msvc_arch: x86
            cli: "ON"
            pkg: pakka
          - package_arch: x64
            msvc_arch: x64
            cli: "OFF"
            pkg: libpakka
          - package_arch: x86
            msvc_arch: x86
            cli: "OFF"
            pkg: libpakka
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.verify.outputs.tag }}
      # Same MSVC setup the test workflow uses — Node-24-compatible fork
      # of ilammy/msvc-dev-cmd. Puts cl.exe + the Windows SDK on PATH so
      # `cmake -G Ninja` picks MSVC instead of MinGW.
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.msvc_arch }}
      - name: Build and package ZIP
        # PAKKA_BUILD_TESTING=OFF: the release build only packages — it
        # never runs ctest — so skip compiling the test suite (which also
        # references the pakka_exe target that the CLI=OFF leg doesn't build).
        run: |
          cmake -B build/cmake -G Ninja -DPAKKA_BUILD_CLI=${{ matrix.cli }} -DPAKKA_PACKAGE_BASENAME=${{ matrix.pkg }} -DPAKKA_BUILD_TESTING=OFF -DPAKKA_PACKAGE_PLATFORM=windows-${{ matrix.package_arch }} .
          cmake --build build/cmake
          Push-Location build/cmake
          cpack -G ZIP
          Pop-Location
      - name: Compute SHA-256 sidecar
        shell: pwsh
        run: |
          $version = "${{ needs.verify.outputs.version }}"
          $zipName = "${{ matrix.pkg }}-$version-windows-${{ matrix.package_arch }}.zip"
          $zipPath = "build/cmake/$zipName"
          if (-not (Test-Path $zipPath)) {
              throw "expected $zipPath after cpack — not found"
          }
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $zipName" | Out-File "$zipPath.sha256" -Encoding ascii
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.pkg }}-windows-${{ matrix.package_arch }}-zip
          path: |
            build/cmake/${{ matrix.pkg }}-*-windows-${{ matrix.package_arch }}.zip
            build/cmake/${{ matrix.pkg }}-*-windows-${{ matrix.package_arch }}.zip.sha256
          if-no-files-found: error

  # Native macOS binary archives — Makefile build + staged install into
  # a package root, then a .tar.gz archive with a SHA-256 sidecar
  # (.tar.gz is the canonical macOS/Unix format; .zip is Windows-only).
  # These run on the same native Intel and Apple Silicon
  # labels as test.yml so the binary architecture matches the package
  # suffix; no cross-compile or universal-binary merge step is hidden
  # in the release path.
  macos-archives:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26-intel
            package_arch: x86_64
          - runner: macos-26
            package_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag }}
      - name: Build native macOS binary
        run: make
      - name: Package macOS archives
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          PACKAGE_ARCH: ${{ matrix.package_arch }}
        run: |
          set -euo pipefail
          package="pakka-${VERSION}-macos-${PACKAGE_ARCH}"
          rm -rf dist package-root
          mkdir -p dist package-root
          make install PREFIX= DESTDIR="$PWD/package-root/$package"
          tar -C package-root -czf "dist/$package.tar.gz" "$package"
          (
              cd dist
              shasum -a 256 "$package.tar.gz" > "$package.tar.gz.sha256"
          )
      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.package_arch }}-archives
          path: |
            dist/pakka-*-macos-${{ matrix.package_arch }}.tar.gz
            dist/pakka-*-macos-${{ matrix.package_arch }}.tar.gz.sha256
          if-no-files-found: error

  # Final job: download all build-job artifacts and attach them to a
  # fresh GitHub release. --generate-notes derives the changelog from
  # commits since the previous release tag; --verify-tag protects
  # against a typo'd workflow_dispatch input. We still check out the
  # tagged source so `gh release create` has repo context without
  # relying on env vars.
  release:
    needs: [verify, source-tarball, windows-zip, macos-archives]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.verify.outputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          # GitHub auto-attaches "Source code (zip)" and "Source code
          # (tar.gz)" archives via /archive/refs/tags/$TAG; the explicit
          # `dist/*` we add here are the curated, SHA-pinned artifacts
          # (pakka-X.Y.Z.tar.gz, pakka-X.Y.Z-windows-x64.zip, and their
          # .sha256 sidecars). --generate-notes derives a changelog from
          # commits since the previous release tag; --verify-tag fails
          # fast if release.yml was triggered by a workflow_dispatch
          # with a non-existent tag.
          gh release create "$TAG" \
              --title "Pakka $TAG" \
              --generate-notes \
              --verify-tag \
              dist/*
