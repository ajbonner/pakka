install
text
cdrom
lang en_US
langsupport --default=en_US en_US
keyboard us
mouse none
network --bootproto=dhcp --device=eth0 --hostname=pakka-rh9
rootpw pakka
firewall --disabled
authconfig --enableshadow --enablemd5
timezone --utc Europe/London
bootloader --location=mbr --append="console=ttyS0"
zerombr yes
clearpart --all --initlabel
part /boot --fstype=ext3 --size=100
part swap --size=256
part / --fstype=ext3 --size=1 --grow
skipx
reboot

%packages --resolvedeps
gcc
make
glibc-devel
binutils
cpp
tar
gzip
curl
openssh
openssh-clients
openssh-server

%post
/sbin/chkconfig sshd on
grep -q '^ttyS0$' /etc/securetty || echo ttyS0 >> /etc/securetty
grep -q 'ttyS0' /etc/inittab || echo 'S0:2345:respawn:/sbin/mingetty ttyS0' >> /etc/inittab
cat > /root/run-pakka-build.sh <<'EOF'
#!/bin/sh
set -e
rm -rf /root/pakka-src /root/pakka-src.tar.gz /root/pakka-build.log
curl -f -o /root/pakka-src.tar.gz http://10.0.2.2:8000/pakka-src.tar.gz
mkdir /root/pakka-src
cd /root/pakka-src
tar xzf /root/pakka-src.tar.gz
# Run the build+smoke block with output redirected (no pipe!) so the
# group's real exit status survives. Temporarily disable the outer
# errexit while capturing the status; the inner subshell stays fail-fast.
# Piping to `tee` swallows the inner status under POSIX sh, which
# silently masked failures here before.
set +e
(
  set -e
  echo "== system =="
  uname -a
  cat /etc/redhat-release
  echo "== toolchain =="
  gcc --version
  make --version
  echo "== build =="
  make
  echo "== smoke =="
  # `./pakka -h` exits 1 by design; grep the banner instead.
  if ! ./pakka -h 2>&1 | head -1 | grep -q '^Pakka '; then
    echo "smoke test failed: pakka banner not printed" >&2
    exit 1
  fi
  file ./pakka
  ldd ./pakka
) > /root/pakka-build.log 2>&1
rc=$?
set -e
cat /root/pakka-build.log
exit "$rc"
EOF
chmod +x /root/run-pakka-build.sh
%end
